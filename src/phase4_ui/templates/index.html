<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Restaurant Recommender</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="glass-container main-wrapper">
        <header class="app-header">
            <h1 class="gradient-text">AI Restaurant Recommender</h1>
            <p class="subtitle">Discover your next favorite meal using AI.</p>
        </header>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form id="recommendation-form" action="{{ url_for('recommend') }}" method="POST" class="preference-form">
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="e.g. Indiranagar, Whitefield" required>
            </div>

            <div class="form-row">
                <div class="form-group half-width">
                    <label for="budget">Budget Level</label>
                    <select id="budget" name="budget">
                        <option value="">Any Budget</option>
                        <option value="low">Low (₹0 - ₹500)</option>
                        <option value="medium">Medium (₹500 - ₹1500)</option>
                        <option value="high">High (₹1500+)</option>
                    </select>
                </div>
                
                <div class="form-group half-width">
                    <label for="cuisine">Cuisine Type</label>
                    <input type="text" id="cuisine" name="cuisine" placeholder="e.g. Italian, North Indian">
                </div>
            </div>

            <div class="form-group">
                <label for="min_rating">Minimum Rating (0-5)</label>
                <div class="slider-container">
                    <input type="range" id="min_rating" name="min_rating" min="0" max="5" step="0.5" value="3.5">
                    <span id="rating_val" class="slider-val">3.5</span>
                </div>
            </div>

            <div class="form-group">
                <label for="additional_prefs">Additional Preferences</label>
                <textarea id="additional_prefs" name="additional_prefs" rows="2" placeholder="e.g. Must have outdoor seating, romantic date spot"></textarea>
            </div>

            <button type="submit" id="submit-btn" class="primary-btn">
                <span class="btn-text">Generate AI Recommendations</span>
                <div class="loader hidden"></div>
            </button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
